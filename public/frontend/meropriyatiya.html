<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Мероприятия</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/modal.css" />
</head>
<body>
  <div id="header-container"></div>

  <header>
    <h1>Мероприятия</h1>
    <div class="dashboard-actions">
      <button id="addEventBtn">➕ Добавить мероприятие</button>
      <div class="filters">
        <input type="text" id="filterTitle" placeholder="Поиск по названию...">
        <select id="filterType">
          <option value="">Тип</option>
          <option value="Конкурс">Конкурс</option>
          <option value="Круглый стол">Круглый стол</option>
          <option value="Олимпиада">Олимпиада</option>
          <option value="Мероприятие">Мероприятие</option>
          <option value="Конференция">Конференция</option>
          <option value="Семинар">Семинар</option>
        </select>
        <select id="filterLevel">
          <option value="">Уровень</option>
          <option value="Международный">Международный</option>
          <option value="Федеральный">Федеральный</option>
          <option value="Региональный">Региональный</option>
          <option value="Муниципальный">Муниципальный</option>
          <option value="Внутришкольный">Внутришкольный</option>
        </select>
        <input type="date" id="dateFrom">
        <input type="date" id="dateTo">
        <button id="applyFiltersBtn">Применить</button>
        <button id="resetFiltersBtn">Сбросить</button>
      </div>
    </div>
  </header>

  <main>
    <div class="event-list" id="eventList"></div>
  </main>

  <!-- Модалка мероприятия -->
  <div id="eventModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Добавить мероприятие</h2>
        <span id="closeEventBtnTop" class="close-btn">&times;</span>
      </div>

      <div id="modalTabs" class="tabs hidden">
        <button class="tab active" onclick="switchTab('info')">Информация</button>
        <button class="tab" onclick="switchTab('students')">Участники</button>
      </div>

      <div class="modal-body">
        <div id="tab-info" class="tab-content">
          <form id="eventForm" class="form-grid">
            <label for="eventTitle">Название мероприятия:</label>
            <input type="text" id="eventTitle" placeholder="Название мероприятия" required>

            <label for="eventDate">Дата:</label>
            <input type="date" id="eventDate" required>

            <label for="eventPlace">Место проведения:</label>
            <input type="text" id="eventPlace" placeholder="Место проведения">

            <label for="eventType">Тип мероприятия:</label>
            <select id="eventType" name="Type">
              <option value="">Все типы</option>
              <option value="Конкурс">Конкурс</option>
              <option value="Круглый стол">Круглый стол</option>
              <option value="Олимпиада">Олимпиада</option>
              <option value="Мероприятие">Мероприятие</option>
              <option value="Конференция">Конференция</option>
              <option value="Семинар">Семинар</option>
            </select>

            <label for="eventLevel">Уровень:</label>
            <select id="eventLevel" name="Lvl">
              <option value="">Все уровни</option>
              <option value="Международный">Международный</option>
              <option value="Федеральный">Федеральный</option>
              <option value="Региональный" selected>Региональный</option>
              <option value="Муниципальный">Муниципальный</option>
              <option value="Внутренний">Внутренний</option>
            </select>

            <label for="eventOrder">Приказ (PDF, DOCX):</label>
            <input type="file" id="eventOrder" accept=".pdf,.doc,.docx">
          </form>
        </div>
        <div class="modal-footer">
        <button id="cancelEventBtn">Отмена</button>
        <button id="saveEventBtn">Сохранить</button>
        </div>

        <div id="tab-students" class="tab-content hidden">
          <div class="students-header">
            <h3>Участники</h3>
            <button id="openAddStudent" onclick="openAddStudent()" class="add-student-btn">+ Добавить</button>
          </div>
          <table class="students-table">
      <thead>
        <tr>
          <th>ФИО</th>
          <th>Место</th>
          <th>Преподаватель</th>
          <th>Сертификат</th>
          <th>Действия</th>
        </tr>
      </thead>

    <tbody id="studentsTableBody"></tbody>
      </div>
        
      </div>
    </div>
  </div>


  <!-- Модалка добавления участника -->
  <div id="addStudentModal" class="modal hidden">
    <div class="modal-content small">
      <div class="modal-header">
        <h3>Добавить участника</h3>
        <span id="closeAddStudentTop" class="close-btn" onclick="closeAddStudent()">&times;</span>
      </div>

      <div class="modal-body">
        <div class="form-grid">
          <label for="groupFilter">Группа:</label>
          <select id="groupFilter" onchange="filterStudentsByGroup(this.value)">
            <option value="">Все группы</option>
            
          </select>
          <label for="studentSelect">Студент:</label>
          <select id="studentSelect"></select>

          <label for="teacherSelect">Руководитель:</label>
          <select id="teacherSelect"></select>

          <label for="studentPlace">Место:</label>
            <input type="text" id="studentPlace" >

          <label for="studentCertificate">Сертификат (PDF/JPG/PNG):</label>
          <input type="file" id="studentCertificate" accept=".pdf,.png,.jpg,.jpeg">
        </div>
      </div>
      <div class="modal-footer">
        <button id="closeAddStudentBtn" >Отмена</button>
        <button id="addStudentToListBtn">Добавить</button>
      </div>
      
    </div>
    
  </div>

  <script src="/js/header.js"></script>
  <script src="/js/meropriyatiya.js"></script>
</body>
</html>
